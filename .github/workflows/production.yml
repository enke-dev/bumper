name: production

# The real, official release: on a push to main, cut the npm `latest` release AND
# a GitHub release carrying the platform binaries. (preview.yml is the PR-side
# counterpart, publishing throwaway `@pr-N` versions.)
on:
  push:
    branches: [main]

# serialize releases per ref: two pushes to main must not run release-it in
# parallel (tag/version race, double publish). Don't cancel an in-flight release.
concurrency:
  group: production-${{ github.ref }}
  cancel-in-progress: false

# default for the reusable check call — check.yml writes a test report, and a
# reusable workflow can't be granted more than its caller. The release job overrides.
permissions:
  contents: read
  checks: write

jobs:
  check:
    uses: ./.github/workflows/check.yml
    secrets: inherit

  release:
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Check out repo
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: package.json

      # npmjs auth for the `@enke.dev/bumper` publish (public scoped package).
      # The @enke.dev/lint devDep is public on npmjs too — installs need no auth.
      - name: Configure npm auth
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > .npmrc

      # `bun install` runs the `prepare` script → builds dist/cli.mjs. npm re-runs
      # `prepare` at publish/pack time too, so the tarball always contains the build.
      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Configure git identity
        run: |
          git config user.name  "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

      # release-it (config in .release-it.json) does it all in one run — bump,
      # changelog, npm publish, push the tag, and create the GitHub release with the
      # binaries attached. Its `after:bump` hook compiles the binaries AFTER the
      # version bump, so they bake in the released version (not the pre-bump one).
      # No-op when there are no releasable commits. The release commit it pushes uses
      # GITHUB_TOKEN, so it won't re-trigger this workflow (loop-prevention helps here).
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bunx -p release-it -p @release-it/conventional-changelog release-it --ci

      - name: Resolve released version
        id: version
        run: |
          version="$(node -p "require('./package.json').version")"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Released ${version} :rocket:" >> "$GITHUB_STEP_SUMMARY"
