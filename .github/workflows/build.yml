name: build

# Reusable: compile the self-contained binaries once, upload them as an artifact.
# Called by production (→ attached to the GH release) and preview (→ downloadable
# per-PR). Reusable rather than tag-triggered because a tag pushed by GITHUB_TOKEN
# can't trigger another workflow (GitHub loop-prevention) and we won't use a bot.
on:
  workflow_call:

# least privilege: only reads the repo + writes a run artifact (no GITHUB_TOKEN writes)
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Bun cross-compiles every target from one Linux runner into a self-contained
      # binary (runtime embedded) — consumers need no local Node/Bun.
      - name: Compile self-contained binaries
        run: |
          mkdir -p dist/bin
          for target in linux-x64 linux-arm64 darwin-x64 darwin-arm64 windows-x64; do
            out="dist/bin/bmpr-${target}"
            [ "$target" = windows-x64 ] && out="${out}.exe"
            echo "compiling ${target}…"
            bun build --compile --target="bun-${target}" ./src/cli.ts --outfile "$out"
          done

      - name: Upload binaries
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: binaries
          path: dist/bin/
          if-no-files-found: error
