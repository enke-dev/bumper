name: Preview cleanup

# When a PR closes (merged or not), delete its floating `pr-<number>` GitHub
# pre-release + tag so they don't accumulate. (Previews are GitHub-only.)
on:
  pull_request:
    types: [closed]

concurrency:
  group: preview-cleanup-${{ github.event.pull_request.number }}
  cancel-in-progress: false

# contents: write to delete the pre-release + its tag
permissions:
  contents: write

jobs:
  cleanup:
    # fork PRs never publish a preview, so there's nothing to clean
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      # `|| true`: idempotent — a PR that never published (closed with no commits, or
      # already cleaned) has no release, and that's fine
      - name: Remove the PR's preview release (GitHub)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "pr-${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" --yes --cleanup-tag 2>/dev/null || true
