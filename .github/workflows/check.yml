name: check

on:
  # run only on pull requests, as the trunk is covered by the release.yml already
  pull_request:
    branches: ['*']
  # reused by release.yml
  workflow_call:

jobs:
  check:
    runs-on: ubuntu-latest
    name: check, lint & test
    permissions:
      contents: read
      checks: write
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Type check
        run: bun run check

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test

      - name: Publish test report
        # run even when tests fail, so failures surface in the summary
        if: ${{ !cancelled() }}
        uses: mikepenz/action-junit-report@d9f48fc87bc235f7e214acf696ca5abc0a986f16 # v6.4.2
        with:
          report_paths: reports/junit.*.xml
          check_name: test report
          # detailed table only for failures; passing runs show just the summary line
          detailed_summary: true
          include_passed: false
          skip_success_summary: true
