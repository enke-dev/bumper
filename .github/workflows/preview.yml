name: Preview

on:
  pull_request:
    branches: [main]

# one preview per PR: a new push supersedes the in-flight run (only the latest
# commit's preview is worth publishing)
concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

# default for the reusable check call — check.yml writes a test report, and a
# reusable workflow can't be granted more than its caller. The preview job overrides.
permissions:
  contents: read
  checks: write

jobs:
  check:
    uses: ./.github/workflows/check.yml
    secrets: inherit

  preview:
    needs: check
    # fork PRs get a read-only GITHUB_TOKEN (can't create the release) — skip the
    # preview there; the check job above still runs for them
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    # contents: write — creates/refreshes the floating `pr-<number>` pre-release + tag
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # stamp a traceable preview version into package.json (local only — previews are
      # GitHub-only, not published to npm) so the compiled binary reports it. run_number
      # is globally monotonic, so each build is uniquely identifiable.
      - name: Set preview version
        id: version
        run: |
          base="$(node -p "require('./package.json').version")"
          preview="${base}-pr-${{ github.event.pull_request.number }}.${{ github.run_number }}"
          npm version "$preview" --no-git-tag-version
          echo "version=${preview}" >> "$GITHUB_OUTPUT"

      # compile AFTER the version stamp so the binaries bake in the preview version
      # (the CLI reads it from package.json at compile time)
      - name: Compile binaries
        run: sh scripts/build-binaries.sh

      # a floating `pr-<number>` pre-release carrying the binaries, refreshed each push
      # (delete + recreate at the head SHA). `--prerelease` so it never becomes the
      # "latest" release the installer targets.
      - name: Publish preview to GitHub
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="pr-${{ github.event.pull_request.number }}"
          gh release delete "$tag" --yes --cleanup-tag 2>/dev/null || true
          gh release create "$tag" dist/bin/bmpr-* \
            --prerelease \
            --target "${{ github.event.pull_request.head.sha }}" \
            --title "Preview — PR #${{ github.event.pull_request.number }}" \
            --notes "Preview build for PR #${{ github.event.pull_request.number }} (\`${{ steps.version.outputs.version }}\`). Binaries below; install per README."

      - name: Summary
        run: |
          tag='pr-${{ github.event.pull_request.number }}'
          version='${{ steps.version.outputs.version }}'
          {
            echo "### Preview published :package:"
            echo ''
            echo "Binaries on the \`${tag}\` GitHub pre-release (\`${version}\`)."
          } >> "$GITHUB_STEP_SUMMARY"
