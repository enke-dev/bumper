name: Preview

on:
  pull_request:
    branches: [main]

# one preview per PR: a new push supersedes the in-flight run (only the latest
# commit's preview is worth publishing)
concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

# default for the reusable check/build calls — check.yml writes a test report, and a
# reusable workflow can't be granted more than its caller. The preview job overrides.
# (publishing itself uses NPM_TOKEN, not GITHUB_TOKEN.)
permissions:
  contents: read
  checks: write

jobs:
  check:
    uses: ./.github/workflows/check.yml
    secrets: inherit

  # same reusable build as production — the binaries land as a run artifact,
  # downloadable per-PR so a reviewer can test the actual binary, not just the npm bin
  build:
    uses: ./.github/workflows/build.yml

  preview:
    needs: [check, build]
    # fork PRs can't read NPM_TOKEN (GitHub withholds secrets), so publish would
    # fail — skip it there; the check + build jobs above still run for them
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: package.json

      # npmjs auth for the `@enke.dev/bumper` publish (public scoped package)
      - name: Configure npm auth
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > .npmrc

      # runs the `prepare` script → builds dist/cli.mjs (npm re-runs it at publish too)
      - name: Install dependencies
        run: bun install --frozen-lockfile

      # immutable, traceable version: <base>-pr-<number>.<run_number>. run_number is
      # globally monotonic so it never collides — every push publishes a fresh version
      - name: Set preview version
        id: version
        run: |
          base="$(node -p "require('./package.json').version")"
          preview="${base}-pr-${{ github.event.pull_request.number }}.${{ github.run_number }}"
          npm version "$preview" --no-git-tag-version
          echo "version=${preview}" >> "$GITHUB_OUTPUT"

      # per-PR dist-tag `pr-<number>` floats to this PR's newest build (never `latest`);
      # the exact <version> stays immutable for pinning
      - name: Publish preview
        run: npm publish --tag "pr-${{ github.event.pull_request.number }}" --access public

      - name: Summary
        run: |
          version='${{ steps.version.outputs.version }}'
          tag='pr-${{ github.event.pull_request.number }}'
          {
            echo "### Preview published :package:"
            echo ''
            echo "Floating (newest on this PR):"
            echo "\`\`\`sh"
            echo "bunx --bun @enke.dev/bumper@${tag} update"
            echo "\`\`\`"
            echo "Pinned (this exact build):"
            echo "\`\`\`sh"
            echo "npm i @enke.dev/bumper@${version}"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"
