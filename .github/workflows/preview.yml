name: Preview

on:
  pull_request:
    branches: [main]

# one preview per PR: a new push supersedes the in-flight run (only the latest
# commit's preview is worth publishing)
concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check:
    uses: ./.github/workflows/check.yml
    secrets: inherit

  preview:
    needs: check
    # fork PRs can't read NPM_TOKEN (GitHub withholds secrets), so publish would
    # fail — skip it there; the check job above still runs for them
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: package.json

      # npmjs auth for the `@enke.dev/bumper` publish (public scoped package)
      - name: Configure npm auth
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > .npmrc

      # runs the `prepare` script → builds dist/cli.mjs (npm re-runs it at publish too)
      - name: Install dependencies
        run: bun install --frozen-lockfile

      # immutable, traceable version: <base>-pr-<number>.<run_number>. run_number is
      # globally monotonic so it never collides — every push publishes a fresh version
      - name: Set preview version
        id: version
        run: |
          base="$(node -p "require('./package.json').version")"
          preview="${base}-pr-${{ github.event.pull_request.number }}.${{ github.run_number }}"
          npm version "$preview" --no-git-tag-version
          echo "version=${preview}" >> "$GITHUB_OUTPUT"

      # dist-tag `preview` keeps it off `latest`; the exact version is immutable
      - name: Publish preview
        run: npm publish --tag preview --access public

      - name: Summary
        run: |
          version='${{ steps.version.outputs.version }}'
          {
            echo "### Preview published :package:"
            echo ''
            echo "\`\`\`sh"
            echo "npm  i @enke.dev/bumper@${version}"
            echo "bunx --bun @enke.dev/bumper@${version} update"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"
