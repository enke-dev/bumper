name: bumper update
description: Run bumper against a repo and open (or update) a dependency-update pull request.

# Usage — call from a scheduled workflow in any repo:
#
#   on:
#     schedule:
#       - cron: '0 6 * * 1'   # every Monday at 06:00 UTC
#     workflow_dispatch:
#   jobs:
#     bumper:
#       runs-on: ubuntu-latest
#       permissions:
#         contents: write
#         pull-requests: write
#       steps:
#         - uses: enke-dev/bumper@main
#           with:
#             base: main

inputs:
  base:
    description: Base branch for the PR (defaults to the repository default branch)
    default: ''
  branch:
    description: Branch name used for the update commit and PR
    default: chore/bumper-update
  pr-title:
    description: Title of the update PR
    default: 'chore: update dependencies'
  pr-labels:
    description: Comma-separated list of labels to apply to the PR
    default: ''
  only:
    description: Run only the listed module ids (comma-separated, e.g. "node,pnpm")
    default: ''
  skip:
    description: Skip the listed module ids (comma-separated, e.g. "docker")
    default: ''
  exclude:
    description: Space-separated repo-relative paths to exclude (e.g. "examples fixtures")
    default: ''
  token:
    description: Token used to push the branch and open the PR (defaults to the job's GITHUB_TOKEN)
    default: ${{ github.token }}

outputs:
  updated:
    description: '"true" when bumper produced a new commit, otherwise "false"'
    value: ${{ steps.changed.outputs.updated }}
  branch:
    description: The update branch name
    value: ${{ inputs.branch }}
  base:
    description: The resolved base branch
    value: ${{ steps.base.outputs.branch }}
  pr-number:
    description: The created or updated PR number (empty when nothing changed)
    value: ${{ steps.pr.outputs.number }}

runs:
  using: composite
  steps:
    - name: Check out repo
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        # full history so bumper can commit and the push isn't rejected
        fetch-depth: 0
        token: ${{ inputs.token }}

    - name: Set up Bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      with:
        bun-version: latest

    - name: Configure git identity
      shell: bash
      run: |
        git config user.name  "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Resolve base branch
      id: base
      shell: bash
      run: |
        base="${{ inputs.base }}"
        if [ -z "$base" ]; then
          base="${{ github.event.repository.default_branch }}"
        fi
        echo "branch=$base" >> "$GITHUB_OUTPUT"

    - name: Create or reset update branch
      shell: bash
      run: |
        git fetch origin "${{ inputs.branch }}" 2>/dev/null || true
        git checkout -B "${{ inputs.branch }}" "origin/${{ steps.base.outputs.branch }}" 2>/dev/null \
          || git checkout -B "${{ inputs.branch }}"

    - name: Record pre-update commit
      id: pre
      shell: bash
      run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

    - name: Build bumper flags
      id: flags
      shell: bash
      run: |
        args="--ignore-config"
        if [ -n "${{ inputs.only }}" ]; then
          for m in $(echo "${{ inputs.only }}" | tr ',' ' '); do
            args="$args --only $m"
          done
        fi
        if [ -n "${{ inputs.skip }}" ]; then
          for m in $(echo "${{ inputs.skip }}" | tr ',' ' '); do
            args="$args --skip $m"
          done
        fi
        if [ -n "${{ inputs.exclude }}" ]; then
          for p in ${{ inputs.exclude }}; do
            args="$args --exclude $p"
          done
        fi
        echo "args=$args" >> "$GITHUB_OUTPUT"

    - name: Run bumper update
      shell: bash
      run: bunx --bun @enke.dev/bumper update --commit ${{ steps.flags.outputs.args }}

    - name: Check for changes
      id: changed
      shell: bash
      run: |
        if [ "$(git rev-parse HEAD)" != "${{ steps.pre.outputs.sha }}" ]; then
          echo "updated=true" >> "$GITHUB_OUTPUT"
        else
          echo "updated=false" >> "$GITHUB_OUTPUT"
          echo "Nothing to update — skipping PR step."
        fi

    - name: Push update branch
      if: steps.changed.outputs.updated == 'true'
      shell: bash
      run: git push origin "${{ inputs.branch }}" --force

    - name: Create or update PR
      id: pr
      if: steps.changed.outputs.updated == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
      run: |
        base="${{ steps.base.outputs.branch }}"
        branch="${{ inputs.branch }}"
        title="${{ inputs.pr-title }}"
        labels="${{ inputs.pr-labels }}"

        # Grab the commit body written by bumper --commit as the PR body
        body="$(git log -1 --format='%b' HEAD)"

        # Update the existing PR if one is already open, otherwise create a new one.
        # Labels are applied separately below so a missing label can't abort the PR.
        existing="$(gh pr list --head "$branch" --base "$base" --json number --jq '.[0].number' 2>/dev/null || true)"
        if [ -n "$existing" ]; then
          gh pr edit "$existing" --title "$title" --body "$body"
          number="$existing"
          echo "Updated PR #${number}: ${title}"
        else
          gh pr create --head "$branch" --base "$base" --title "$title" --body "$body"
          number="$(gh pr view "$branch" --json number --jq .number)"
          echo "Created PR #${number}: ${title}"
        fi
        echo "number=$number" >> "$GITHUB_OUTPUT"

        # Apply labels one at a time; warn (don't fail) if a label doesn't exist yet
        if [ -n "$labels" ]; then
          for l in $(echo "$labels" | tr ',' ' '); do
            gh pr edit "$number" --add-label "$l" \
              || echo "::warning::label '$l' not found in this repo — skipped (create it to have it applied)"
          done
        fi
